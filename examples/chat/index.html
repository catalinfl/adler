<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Adler Chat</title>
  <style>
    :root {
      color-scheme: dark;
      --bg-0: #050816;
      --bg-1: #0b1224;
      --panel: rgba(12, 18, 34, 0.78);
      --panel-strong: rgba(17, 24, 39, 0.92);
      --border: rgba(148, 163, 184, 0.16);
      --text: #e8eefc;
      --muted: #92a0bd;
      --accent: #5eead4;
      --accent-2: #60a5fa;
      --accent-3: #f472b6;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.44);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      margin: 0;
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(96, 165, 250, 0.22), transparent 28%),
        radial-gradient(circle at top right, rgba(94, 234, 212, 0.16), transparent 24%),
        radial-gradient(circle at bottom center, rgba(244, 114, 182, 0.10), transparent 26%),
        linear-gradient(180deg, var(--bg-0), var(--bg-1));
      overflow: hidden;
      min-height: 100vh;
    }

    .app {
      width: 100%;
      height: 100vh;
      min-height: 100vh;
      display: grid;
      grid-template-rows: 1fr;
      gap: 16px;
      padding: 16px;
      overflow: hidden;
    }

    .frame {
      height: 100%;
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(12, 18, 34, 0.94), rgba(8, 13, 25, 0.88));
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      min-height: 0;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 20px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.12);
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.84), rgba(15, 23, 42, 0.58));
    }

    .title {
      display: grid;
      gap: 4px;
    }

    .title h1 {
      margin: 0;
      font-size: clamp(1.35rem, 3vw, 2rem);
      letter-spacing: -0.03em;
    }

    .title p {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.18);
      background: rgba(15, 23, 42, 0.72);
      color: var(--muted);
      white-space: nowrap;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #64748b;
      box-shadow: 0 0 0 4px rgba(100, 116, 139, 0.15);
      transition: 160ms ease;
    }

    .dot.live {
      background: var(--accent);
      box-shadow: 0 0 0 4px rgba(94, 234, 212, 0.16);
    }

    .content {
      height: 100%;
      min-height: 0;
      min-width: 0;
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      gap: 16px;
      padding: 16px;
    }

    .panel {
      min-height: 0;
      border: 1px solid rgba(148, 163, 184, 0.14);
      border-radius: 24px;
      background: var(--panel);
      overflow: hidden;
    }

    .sidebar {
      display: grid;
      align-content: start;
      gap: 14px;
      padding: 16px;
    }

    .card {
      display: grid;
      gap: 10px;
      padding: 14px;
      border-radius: 18px;
      background: var(--panel-strong);
      border: 1px solid rgba(148, 163, 184, 0.10);
    }

    .card label {
      color: var(--muted);
      font-size: 0.85rem;
    }

    .card input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(148, 163, 184, 0.18);
      background: rgba(5, 8, 22, 0.78);
      color: var(--text);
      outline: none;
      transition: 160ms ease;
    }

    .card input:focus {
      border-color: rgba(96, 165, 250, 0.8);
      box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.12);
    }

    .meta {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.5;
      display: grid;
      gap: 8px;
    }

    .room-actions {
      display: grid;
      gap: 8px;
      margin-top: 6px;
    }

    .room-btn {
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 12px;
      padding: 10px 12px;
      text-align: left;
      background: rgba(5, 8, 22, 0.75);
      color: var(--text);
      cursor: pointer;
      font-weight: 700;
      transition: 140ms ease;
    }

    .room-btn:hover {
      border-color: rgba(96, 165, 250, 0.65);
      transform: translateY(-1px);
    }

    .room-btn.active {
      background: linear-gradient(135deg, rgba(96, 165, 250, 0.22), rgba(94, 234, 212, 0.18));
      border-color: rgba(94, 234, 212, 0.55);
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(96, 165, 250, 0.12);
      color: var(--text);
      border: 1px solid rgba(96, 165, 250, 0.20);
    }

    .chat {
      min-height: 0;
      height: 100%;
      width: 100%;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    .messages {
      flex: 1 1 auto;
      min-height: 0;
      max-height: 100%;
      min-width: 0;
      margin: 0;
      padding: 18px;
      list-style: none;
      overflow-y: auto;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overscroll-behavior: contain;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 10px; }
    .messages::-webkit-scrollbar-track {
      background: rgba(148, 163, 184, 0.08);
      border-radius: 999px;
    }
    .messages::-webkit-scrollbar-thumb {
      background: rgba(96, 165, 250, 0.32);
      border-radius: 999px;
      border: 2px solid rgba(5, 8, 22, 0.55);
    }

    .message {
      flex: 0 0 auto;
      align-self: flex-start;
      width: fit-content;
      max-width: min(760px, 90%);
      display: grid;
      gap: 6px;
      padding: 14px 16px;
      border-radius: 18px;
      border: 1px solid rgba(148, 163, 184, 0.14);
      background: rgba(10, 15, 28, 0.84);
      animation: pop 160ms ease-out;
    }

    .message.me {
      align-self: flex-end;
      background: linear-gradient(135deg, rgba(96, 165, 250, 0.26), rgba(94, 234, 212, 0.14));
      border-color: rgba(94, 234, 212, 0.20);
    }

    .message.system {
      align-self: stretch;
      width: 100%;
      max-width: 100%;
      text-align: center;
      color: var(--muted);
      background: transparent;
      border-style: dashed;
    }

    .from {
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 800;
    }

    .content-text {
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.55;
    }

    .composer {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      padding: 16px;
      border-top: 1px solid rgba(148, 163, 184, 0.12);
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.66), rgba(15, 23, 42, 0.90));
    }

    .composer input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid rgba(148, 163, 184, 0.16);
      background: rgba(5, 8, 22, 0.84);
      color: var(--text);
      outline: none;
      transition: 160ms ease;
    }

    .composer input:focus {
      border-color: rgba(94, 234, 212, 0.76);
      box-shadow: 0 0 0 4px rgba(94, 234, 212, 0.10);
    }

    .actions {
      display: inline-flex;
      gap: 10px;
    }

    .actions button {
      border: none;
      padding: 14px 18px;
      border-radius: 16px;
      font-weight: 800;
      color: #05111d;
      cursor: pointer;
      transition: 160ms ease;
    }

    .actions button:hover {
      filter: brightness(1.05);
      transform: translateY(-1px);
    }

    .send-btn {
      background: linear-gradient(135deg, var(--accent-2), var(--accent));
    }

    .rename-btn {
      background: linear-gradient(135deg, var(--accent-3), #fbbf24);
    }

    @keyframes pop {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 980px) {
      body { overflow: auto; }
      .app {
        height: 100vh;
        min-height: 100vh;
      }
      .frame { min-height: 90dvh; }
      .content { grid-template-columns: 1fr; }
    }

    @media (max-width: 640px) {
      .topbar {
        flex-direction: column;
        align-items: stretch;
      }

      .composer {
        grid-template-columns: 1fr;
      }

      .actions {
        width: 100%;
      }

      .actions button {
        flex: 1;
        width: 100%;
      }

      .message { max-width: 100%; }

      .message {
        align-self: stretch;
        width: 100%;
      }

      .message.me {
        align-self: stretch;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="frame">
      <header class="topbar">
        <div class="title">
          <h1>Adler Chat</h1>
          <p>Realtime room chat with live nickname updates.</p>
        </div>
        <div class="status"><span class="dot" id="statusDot"></span><span id="statusText">Disconnected</span></div>
      </header>

      <section class="content">
        <aside class="panel sidebar">
          <div class="card">
            <label for="name">Nickname</label>
            <input id="name" autocomplete="nickname" placeholder="guest-1" maxlength="32" />
            <div class="meta">Type a new nickname and press Enter or click Rename.</div>
          </div>

          <div class="card meta">
            <div><strong>Room:</strong> <span id="roomLabel">lobby</span></div>
            <div><strong>Endpoint:</strong> <span id="endpoint">/ws</span></div>
            <div>Changes appear instantly for all connected clients.</div>
            <div class="pill">Current: <strong id="currentNameLabel">guest</strong></div>
            <div class="room-actions">
              <button class="room-btn active" type="button" data-room="lobby">Lobby</button>
              <button class="room-btn" type="button" data-room="alpha">Alpha Room</button>
              <button class="room-btn" type="button" data-room="beta">Beta Room</button>
            </div>
          </div>
        </aside>

        <section class="panel chat">
          <ul class="messages" id="messages"></ul>

          <form class="composer" id="form">
            <input id="message" autocomplete="off" placeholder="Write a message and press Enter" />
            <div class="actions">
              <button class="rename-btn" type="button" id="renameBtn">Rename</button>
              <button class="send-btn" type="submit">Send</button>
            </div>
          </form>
        </section>
      </section>
    </section>
  </main>

  <script>
    const messages = document.getElementById('messages');
    const form = document.getElementById('form');
    const messageInput = document.getElementById('message');
    const nameInput = document.getElementById('name');
    const renameBtn = document.getElementById('renameBtn');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const endpointText = document.getElementById('endpoint');
    const currentNameLabel = document.getElementById('currentNameLabel');
    const roomLabel = document.getElementById('roomLabel');
    const roomButtons = Array.from(document.querySelectorAll('.room-btn'));

    const wsScheme = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsBase = `${wsScheme}//${location.host}/ws`;
    endpointText.textContent = wsBase;

    let socket;
    let currentName = (localStorage.getItem('adler-name') || '').trim();
    let currentRoom = 'lobby';
    let renameTimer;

    nameInput.value = currentName;
    currentNameLabel.textContent = currentName || 'guest';

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function setStatus(connected, text) {
      statusDot.classList.toggle('live', connected);
      statusText.textContent = text;
    }

    function setCurrentName(nextName) {
      currentName = nextName;
      currentNameLabel.textContent = nextName || 'guest';
      localStorage.setItem('adler-name', nextName);
    }

    function setCurrentRoom(nextRoom) {
      currentRoom = nextRoom;
      roomLabel.textContent = nextRoom;
      roomButtons.forEach((btn) => {
        btn.classList.toggle('active', btn.dataset.room === nextRoom);
      });
    }

    function send(event) {
      if (!socket || socket.readyState !== WebSocket.OPEN) return false;
      socket.send(JSON.stringify(event));
      return true;
    }

    function pushMessage(payload, me = false) {
      const { type, from, message } = payload;
      const li = document.createElement('li');
      li.className = 'message';

      if (type === 'system') {
        li.classList.add('system');
        li.innerHTML = `<div class="content-text">${escapeHtml(message || '')}</div>`;
      } else {
        if (me) li.classList.add('me');
        li.innerHTML = `<div class="from">${escapeHtml(from || 'unknown')}</div><div class="content-text">${escapeHtml(message || '')}</div>`;
      }

      messages.appendChild(li);
      messages.scrollTop = messages.scrollHeight;
    }

    function connect() {
      const name = currentName || (nameInput.value || '').trim();
      const url = name ? `${wsBase}?name=${encodeURIComponent(name)}` : wsBase;

      socket = new WebSocket(url);

      socket.addEventListener('open', () => {
        setStatus(true, 'Connected');
        if (name) {
          nameInput.value = name;
          setCurrentName(name);
        }
      });

      socket.addEventListener('close', () => setStatus(false, 'Disconnected'));
      socket.addEventListener('error', () => setStatus(false, 'Connection error'));

      socket.addEventListener('message', (event) => {
        try {
          const payload = JSON.parse(event.data);
          if (payload.type === 'room_changed' && payload.room) {
            setCurrentRoom(payload.room);
            return;
          }

          pushMessage(payload, payload.type === 'chat' && payload.from === currentName);
        } catch {
          pushMessage({ type: 'system', message: event.data });
        }
      });
    }

    function commitRename() {
      const nextName = nameInput.value.trim();
      if (!nextName || nextName === currentName) return;

      setCurrentName(nextName);
      send({ type: 'rename', name: nextName });
    }

    form.addEventListener('submit', (event) => {
      event.preventDefault();
      const text = messageInput.value.trim();
      if (!text) return;

      const ok = send({ type: 'chat', message: text });
      if (!ok) return;

      messageInput.value = '';
      messageInput.focus();
    });

    renameBtn.addEventListener('click', commitRename);

    roomButtons.forEach((btn) => {
      btn.addEventListener('click', () => {
        const targetRoom = btn.dataset.room;
        if (!targetRoom || targetRoom === currentRoom) return;
        send({ type: 'join_room', room: targetRoom });
      });
    });

    nameInput.addEventListener('input', () => {
      clearTimeout(renameTimer);
      renameTimer = setTimeout(commitRename, 350);
    });

    nameInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        event.preventDefault();
        commitRename();
        messageInput.focus();
      }
    });

    connect();
    messageInput.focus();
  </script>
</body>
</html>
